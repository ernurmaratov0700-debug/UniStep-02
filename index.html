<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniStep - Pro Max</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --secondary: #3b82f6; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; }
        [data-theme="dark"] { --primary: #0f172a; --secondary: #60a5fa; --bg: #1e293b; --card-bg: #334155; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; }
        
        .top-nav { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .hero { height: 30vh; background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%); color: white; border-radius: 0 0 40px 40px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; position: relative; }
        
        .countdown-container { position: absolute; bottom: -20px; background: var(--card-bg); color: var(--text); padding: 10px 25px; border-radius: 50px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); font-weight: bold; font-size: 0.9rem; border: 2px solid var(--secondary); }

        .section-page { display: none; animation: fadeIn 0.4s ease; padding: 40px 15px 25px; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .stat-card { border: none; border-radius: 20px; padding: 15px; background: var(--card-bg); box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; text-align: center; transition: 0.2s; color: var(--text); }
        .stat-card:hover { transform: scale(1.05); background: var(--secondary); color: white; }
        .s-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .chat-bubble { background: #e2e8f0; color: #1e293b; padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; display: inline-block; max-width: 80%; font-size: 0.9rem; }
        .chat-bubble.me { background: var(--secondary); color: white; float: right; }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; }
    </style>
</head>
<body>

    <div id="home" class="section-page active" style="padding:0">
        <div class="top-nav">
            <div class="fw-bold"><i class="fas fa-graduation-cap me-2"></i>UniStep</div>
            <i class="fas fa-adjust" onclick="toggleTheme()" style="cursor:pointer"></i>
        </div>
        <div class="hero">
            <div>
                <h1 class="fw-bold">Сәлем, Студент!</h1>
                <p id="daily-tip" style="opacity: 0.9; font-size: 0.9rem;"></p>
            </div>
            <div class="countdown-container">
                ⏳ Сессияға дейін: <span id="timer" class="text-primary">-- күн</span>
            </div>
        </div>

        <div class="container" style="margin-top: 45px;">
            <div class="row g-2 mb-4">
                <div class="col-4" onclick="openSection('schedule')"><div class="stat-card"><i class="fas fa-clock fa-lg"></i><div class="small fw-bold">Кесте</div></div></div>
                <div class="col-4" onclick="openSection('academic')"><div class="stat-card"><i class="fas fa-calculator fa-lg"></i><div class="small fw-bold">GPA</div></div></div>
                <div class="col-4" onclick="openSection('help')"><div class="stat-card"><i class="fas fa-hands-helping fa-lg"></i><div class="small fw-bold">Көмек</div></div></div>
                <div class="col-4" onclick="openSection('map')"><div class="stat-card"><i class="fas fa-map fa-lg"></i><div class="small fw-bold">Карта</div></div></div>
                <div class="col-4" onclick="openSection('glossary')"><div class="stat-card"><i class="fas fa-book-open fa-lg"></i><div class="small fw-bold">Сөздік</div></div></div>
                <div class="col-4" onclick="openSection('advisor')"><div class="stat-card"><i class="fas fa-user-secret fa-lg"></i><div class="small fw-bold">Админ</div></div></div>
            </div>
            
            <div class="s-card">
                <h6 class="fw-bold"><i class="fas fa-star text-warning me-2"></i>AI Кеңесші</h6>
                <div id="ai-text" class="small text-muted">"GPA-ді қалай көтеруге болады?" - деп сұраңыз...</div>
                <button onclick="askAI()" class="btn btn-sm btn-outline-primary mt-2">Кеңес алу</button>
            </div>
        </div>
    </div>

    <div id="help" class="section-page">
        <div class="container">
            <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Student Help</h3></div>
            <div class="s-card mb-3">
                <h6>Сұрақ қою немесе көмек сұрау:</h6>
                <textarea id="helpInp" class="form-control mb-2" rows="2" placeholder="Маған маятник есебінен көмек керек..."></textarea>
                <button onclick="postHelp()" class="btn btn-primary btn-sm w-100">Жіберу</button>
            </div>
            <div id="helpList"></div>
        </div>
    </div>

    <div id="academic" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>GPA</h3></div>
        <div class="s-card"><input type="number" id="sc" class="form-control mb-2" placeholder="Балл"><button onclick="calcGPA()" class="btn btn-primary w-100">Есептеу</button><h4 id="gpaRes" class="mt-3 text-center"></h4></div>
    </div></div>

    <div id="schedule" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Кесте</h3></div>
        <div id="schList"></div>
    </div></div>

    <div id="map" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Карта</h3></div>
        <div class="s-card text-center">📍 Университет ғимараты 1-қабат</div>
    </div></div>

    <div id="glossary" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Сөздік</h3></div>
        <div id="glossaryView" class="s-card"></div>
    </div></div>

    <div id="advisor" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Админ</h3></div>
        <div id="adminQList"></div>
    </div></div>

    <script>
        const store = (k, v) => localStorage.setItem(k, JSON.stringify(v));
        const get = (k) => JSON.parse(localStorage.getItem(k) || '[]');

        function toggleTheme() {
            const b = document.body;
            const t = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            b.setAttribute('data-theme', t);
        }

        function openSection(id) {
            document.querySelectorAll('.section-page').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function backToHome() { openSection('home'); }

        // --- COUNTDOWN ---
        function updateTimer() {
            const sessionDate = new Date("June 1, 2026 09:00:00").getTime();
            const now = new Date().getTime();
            const diff = sessionDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('timer').innerText = days + " күн";
        }

        // --- AI ASSISTANT ---
        function askAI() {
            const advice = [
                "GPA көтеру үшін: сабаққа кешікпе және дедлайндарды сақта!",
                "Лекцияны диктофонға жазып ал, кейін тыңдауға ыңғайлы.",
                "Ең қиын пәнді таңертең бірінші орындап таста.",
                "Кітапхананың тыныш зонасын қолдан, концентрация жақсы болады.",
                "Оқытушымен жақсы қарым-қатынас - 50% табыс!"
            ];
            document.getElementById('ai-text').innerText = advice[Math.floor(Math.random() * advice.length)];
        }

        // --- STUDENT HELP ---
        function postHelp() {
            let t = document.getElementById('helpInp').value; if(!t) return;
            let h = get('u_help'); h.unshift({t, time: new Date().toLocaleTimeString(), id: Date.now()});
            store('u_help', h); document.getElementById('helpInp').value = ""; renderHelp();
        }
        function renderHelp() {
            let h = get('u_help');
            document.getElementById('helpList').innerHTML = h.map(i => `
                <div class="s-card mb-2 small">
                    <div class="fw-bold text-primary">Студент сұрауы:</div>
                    <div>${i.t}</div>
                    <div class="text-muted mt-1" style="font-size:0.7rem">${i.time}</div>
                </div>
            `).join('');
        }

        function calcGPA() {
            let s = document.getElementById('sc').value;
            document.getElementById('gpaRes').innerText = "GPA: " + (s >= 90 ? "4.0" : (s >= 80 ? "3.0" : "2.0"));
        }

        window.onload = () => {
            updateTimer();
            askAI();
            renderHelp();
            document.getElementById('daily-tip').innerText = "Бүгін жаңа нәрсе үйренуге тамаша күн! ✨";
        };
    </script>
</body>
</html>
