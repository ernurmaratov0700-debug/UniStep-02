<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniStep - Dynamic Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1e293b; --secondary: #3b82f6; --accent: #f59e0b;
            --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b;
        }
        [data-theme="dark"] {
            --primary: #0f172a; --secondary: #60a5fa; --bg: #1e293b; 
            --card-bg: #334155; --text: #f1f5f9;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding-bottom: 30px; }
        
        .top-nav { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .hero { min-height: 30vh; background: linear-gradient(135deg, #2a3a50 30%, var(--secondary) 90%); color: white; border-radius: 0 0 40px 40px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        .timer-display { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); display: inline-block; margin-top: 15px; }

        .section-page { display: none; animation: fadeIn 0.4s ease; padding: 20px 15px; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stat-card { border: none; border-radius: 20px; padding: 15px; background: var(--card-bg); box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; text-align: center; transition: 0.3s; color: var(--text); height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .stat-card:hover { transform: translateY(-3px); background: var(--secondary); color: white; }

        .s-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; }
        .list-item { border-left: 4px solid var(--secondary); padding: 10px 15px; background: rgba(0,0,0,0.05); border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="home" class="section-page active" style="padding:0">
        <div class="top-nav">
            <div class="fw-bold"><i class="fas fa-walking me-2"></i>UniStep</div>
            <i class="fas fa-moon" id="theme-btn" onclick="toggleTheme()" style="cursor:pointer"></i>
        </div>
        <div class="hero">
            <div class="w-100">
                <h2 class="fw-bold mb-1">UniStep</h2>
                <div class="timer-display">
                    <div class="small opacity-75 mb-1">Сессияға қалды:</div>
                    <div id="main-timer" class="h4 fw-bold mb-0">Уақытты енгізіңіз</div>
                </div>
            </div>
        </div>

        <div class="container mt-4">
            <div class="row g-3">
                <div class="col-4" onclick="openSection('schedule')"><div class="stat-card"><i class="fas fa-calendar-alt text-primary fa-lg mb-2"></i><div class="small fw-bold">Кесте</div></div></div>
                <div class="col-4" onclick="openSection('todo')"><div class="stat-card"><i class="fas fa-tasks text-success fa-lg mb-2"></i><div class="small fw-bold">Жоспар</div></div></div>
                <div class="col-4" onclick="openSection('academic')"><div class="stat-card"><i class="fas fa-chart-line text-info fa-lg mb-2"></i><div class="small fw-bold">GPA</div></div></div>
                
                <div class="col-4" onclick="openSection('links-page')"><div class="stat-card"><i class="fas fa-link text-warning fa-lg mb-2"></i><div class="small fw-bold">Сілтеме</div></div></div>
                <div class="col-4" onclick="openSection('map')"><div class="stat-card"><i class="fas fa-map-marked-alt text-danger fa-lg mb-2"></i><div class="small fw-bold">Карта</div></div></div>
                <div class="col-4" onclick="openSection('news-write')"><div class="stat-card"><i class="fas fa-bullhorn text-primary fa-lg mb-2"></i><div class="small fw-bold">Хабар</div></div></div>
            </div>
            
            <div class="s-card mt-4">
                <h6 class="fw-bold mb-3"><i class="fas fa-newspaper me-2 text-primary"></i> Соңғы хабарлар</h6>
                <div id="homeNews"></div>
            </div>
        </div>
    </div>

    <div id="schedule" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Кесте және Сессия</h3></div>
        
        <div class="s-card border border-warning">
            <h6 class="fw-bold mb-3"><i class="fas fa-clock text-warning me-2"></i>Сессия уақытын орнату</h6>
            <div class="input-group">
                <input type="datetime-local" id="session-date-input" class="form-control">
                <button onclick="saveSessionDate()" class="btn btn-warning text-white fw-bold">Сақтау</button>
            </div>
            <small class="text-muted mt-2 d-block">Күнді таңдаңыз, ол басты бетте көрінеді.</small>
        </div>

        <div class="s-card">
            <h6 class="fw-bold mb-3">Сабақ қосу</h6>
            <div class="input-group mb-3">
                <select id="day" class="form-select"><option>Дүйсенбі</option><option>Сейсенбі</option><option>Сәрсенбі</option><option>Бейсенбі</option><option>Жұма</option></select>
                <input type="text" id="subj" class="form-control" placeholder="Пән, уақыт">
                <button onclick="addSch()" class="btn btn-success"><i class="fas fa-plus"></i></button>
            </div>
            <div id="schList"></div>
        </div>
    </div></div>

    <div id="todo" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Жоспар</h3></div>
        <div class="s-card mb-3"><div class="input-group"><input type="text" id="todoInp" class="form-control" placeholder="Жаңа тапсырма..."><button onclick="addTodo()" class="btn btn-success"><i class="fas fa-plus"></i></button></div></div>
        <div id="todoList"></div>
    </div></div>

    <div id="links-page" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Сілтемелер</h3></div>
        <div class="s-card">
            <a href="https://platonus.vku.edu.kz" target="_blank" class="d-block mb-3 text-decoration-none">
                <div class="p-3 bg-light rounded-3 d-flex align-items-center">
                    <i class="fas fa-university me-3 text-primary"></i> <b>Platonus VKU</b>
                </div>
            </a>
            <a href="https://lib.vku.edu.kz" target="_blank" class="d-block text-decoration-none">
                <div class="p-3 bg-light rounded-3 d-flex align-items-center">
                    <i class="fas fa-book me-3 text-success"></i> <b>VKU Кітапхана</b>
                </div>
            </a>
        </div>
    </div></div>

    <div id="academic" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>GPA</h3></div><div class="s-card"><div id="gpa-rows"><div class="row g-2 mb-2"><div class="col-7"><input type="number" class="form-control gpa-score" placeholder="Балл"></div><div class="col-5"><input type="number" class="form-control gpa-credit" placeholder="Кредит"></div></div></div><button onclick="addGpaRow()" class="btn btn-outline-secondary btn-sm mb-3 w-100">+ Пән</button><button onclick="calculateAdvancedGPA()" class="btn btn-primary w-100">Есептеу</button><div id="advancedGpaRes" class="mt-3 h3 fw-bold text-center text-success"></div></div></div></div>
    <div id="map" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Карта</h3></div><div class="s-card p-0 overflow-hidden"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2543.6!2d82.6!3d49.9!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDnCsDU0JzAwLjAiTiA4MsKwMzYnMDAuMCJF!5e0!3m2!1skk!2skz!4v1620000000000!5m2!1skk!2skz" width="100%" height="400" style="border:0;"></iframe></div></div></div>
    <div id="news-write" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Хабар жазу</h3></div><div class="s-card"><textarea id="newsInp" class="form-control mb-3" rows="3" placeholder="Мәтін..."></textarea><button onclick="saveNews()" class="btn btn-warning w-100">Жариялау</button></div></div></div>

    <script>
        const store = (k, v) => localStorage.setItem(k, JSON.stringify(v));
        const get = (k) => JSON.parse(localStorage.getItem(k) || '[]');
        const getStr = (k) => localStorage.getItem(k);

        // --- DYNAMIC TIMER LOGIC ---
        function saveSessionDate() {
            const dateVal = document.getElementById('session-date-input').value;
            if(!dateVal) return alert("Күнді таңдаңыз!");
            localStorage.setItem('session_date', dateVal);
            alert("Сессия күні сақталды!");
            updateMainTimer();
        }

        function updateMainTimer() {
            const savedDate = getStr('session_date');
            const display = document.getElementById('main-timer');
            if(!savedDate) {
                display.innerText = "Орнатылмаған";
                return;
            }
            const diff = new Date(savedDate).getTime() - new Date().getTime();
            if(diff <= 0) {
                display.innerText = "Сессия басталды!";
                return;
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            display.innerText = `${days} күн ${hours} сағат`;
        }
        setInterval(updateMainTimer, 1000);

        // --- CORE FUNCTIONS ---
        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
            document.getElementById('theme-btn').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        function openSection(id) { document.querySelectorAll('.section-page').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
        function backToHome() { openSection('home'); }

        // --- APP LOGIC ---
        function addSch() { let d=document.getElementById('day').value, s=document.getElementById('subj').value; if(!s) return; let l=get('u_sch'); l.push({d,s,id:Date.now()}); store('u_sch',l); document.getElementById('subj').value=""; renderSch(); }
        function renderSch() { document.getElementById('schList').innerHTML = get('u_sch').map(i => `<div class="list-item"><span><b>${i.d}:</b> ${i.s}</span><i class="fas fa-trash text-danger" onclick="del('u_sch',${i.id},renderSch)"></i></div>`).join(''); }
        function addTodo() { let t = document.getElementById('todoInp').value; if(!t) return; let l = get('u_todo'); l.push({t, done: false, id: Date.now()}); store('u_todo', l); document.getElementById('todoInp').value = ""; renderTodo(); }
        function renderTodo() { document.getElementById('todoList').innerHTML = get('u_todo').map(i => `<div class="list-item"><span>${i.t}</span><i class="fas fa-trash text-danger" onclick="del('u_todo',${i.id},renderTodo)"></i></div>`).join(''); }
        function saveNews() { let t = document.getElementById('newsInp').value; if(!t) return; let n = get('u_news'); n.unshift({t, id: Date.now()}); store('u_news', n); renderNews(); backToHome(); }
        function renderNews() { document.getElementById('homeNews').innerHTML = get('u_news').slice(0,3).map(x => `<div class="list-item">${x.t}</div>`).join('') || "Хабар жоқ."; }
        function del(k, id, cb) { store(k, get(k).filter(x => x.id !== id)); cb(); }
        function addGpaRow() { const row = document.createElement('div'); row.className='row g-2 mb-2'; row.innerHTML='<div class="col-7"><input type="number" class="form-control gpa-score" placeholder="Балл"></div><div class="col-5"><input type="number" class="form-control gpa-credit" placeholder="Кредит"></div>'; document.getElementById('gpa-rows').appendChild(row); }
        function calculateAdvancedGPA() {
            let tp = 0, tc = 0;
            document.querySelectorAll('.gpa-score').forEach((s, i) => {
                let score = parseFloat(s.value), credit = parseFloat(document.querySelectorAll('.gpa-credit')[i].value);
                if (score && credit) { let g = score >= 90 ? 4.0 : score >= 80 ? 3.0 : 2.0; tp += g * credit; tc += credit; }
            });
            document.getElementById('advancedGpaRes').innerText = (tc > 0 ? (tp/tc).toFixed(2) : 0);
        }

        window.onload = () => { 
            updateMainTimer(); 
            renderNews(); 
            renderSch(); 
            renderTodo(); 
            // Күнтізбеге бұрын сақталған датаны қойып қою
            const saved = getStr('session_date');
            if(saved) document.getElementById('session-date-input').value = saved;
        };
    </script>
</body>
</html>
