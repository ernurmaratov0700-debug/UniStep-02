<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniStep - Ultimate Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* НЕГІЗГІ ТҮСТЕР */
        :root { 
            --primary: #1e293b; --secondary: #3b82f6; --accent: #f59e0b;
            --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b;
            --muted: #64748b;
        }

        [data-theme="dark"] {
            --primary: #0f172a; --secondary: #60a5fa; --bg: #0f172a; 
            --card-bg: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding-bottom: 30px; }
        
        /* AUTH SECTION (Кіру экраны) */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .auth-card { width: 90%; max-width: 400px; padding: 30px; background: var(--card-bg); border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }

        /* ҚАЛҒАН СТИЛЬДЕР ӨЗГЕРІССІЗ */
        .top-nav { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .hero { min-height: 35vh; background: linear-gradient(135deg, #2a3a50 30%, var(--secondary) 90%); color: white; border-radius: 0 0 40px 40px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .timer-box { display: none; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 20px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.2); width: fit-content; margin-left: auto; margin-right: auto; color: white; }
        .section-page { display: none; animation: fadeIn 0.4s ease; padding: 25px 15px; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-card { border: none; border-radius: 20px; padding: 15px; background: var(--card-bg); box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; text-align: center; transition: 0.3s; color: var(--text); height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .stat-card:hover { transform: translateY(-5px); background: var(--secondary); color: white; }
        .s-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; color: var(--text); }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; color: var(--text); }
        .list-item { border-left: 4px solid var(--secondary); padding: 10px 15px; background: rgba(125,125,125,0.1); border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        .urgent { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.15); animation: pulse 2s infinite; }
        input, select, textarea { background-color: var(--bg) !important; color: var(--text) !important; border: 1px solid var(--muted) !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 class="fw-bold mb-4 text-primary"><i class="fas fa-walking me-2"></i>UniStep</h2>
            <div id="login-form">
                <input type="text" id="user-login" class="form-control mb-3" placeholder="Логин">
                <input type="password" id="user-pass" class="form-control mb-3" placeholder="Құпия сөз">
                <button onclick="handleAuth('login')" class="btn btn-primary w-100 mb-2">Кіру</button>
                <button onclick="toggleAuth(false)" class="btn btn-link btn-sm">Тіркелу</button>
            </div>
            <div id="reg-form" style="display:none">
                <input type="text" id="reg-login" class="form-control mb-3" placeholder="Жаңа логин">
                <input type="password" id="reg-pass" class="form-control mb-3" placeholder="Жаңа құпия сөз">
                <button onclick="handleAuth('reg')" class="btn btn-success w-100 mb-2">Тіркелу</button>
                <button onclick="toggleAuth(true)" class="btn btn-link btn-sm">Кіруге қайту</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <div id="home" class="section-page active" style="padding:0">
            <div class="top-nav">
                <div class="fw-bold" id="welcome-user"></div>
                <div>
                    <i class="fas fa-moon me-3" id="theme-btn" onclick="toggleTheme()" style="cursor:pointer"></i>
                    <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor:pointer"></i>
                </div>
            </div>
            <div class="hero">
                <div class="w-100">
                    <h2 class="fw-bold">UniStep: Цифрлық Ментор</h2>
                    <p id="daily-quote" class="mt-2" style="font-size: 1rem; opacity: 0.9;"></p>
                    <div id="timer-container" class="timer-box">
                        <div class="small mb-1">Сессияға қалды:</div>
                        <div id="countdown" class="h5 fw-bold mb-0"></div>
                    </div>
                </div>
            </div>

            <div class="container mt-4">
                <div class="row g-3">
                    <div class="col-4" onclick="openSection('schedule')"><div class="stat-card"><i class="fas fa-calendar-alt text-primary fa-lg"></i><div class="small fw-bold mt-1">Кесте</div></div></div>
                    <div class="col-4" onclick="openSection('academic')"><div class="stat-card"><i class="fas fa-chart-line text-success fa-lg"></i><div class="small fw-bold mt-1">GPA</div></div></div>
                    <div class="col-4" onclick="openSection('map')"><div class="stat-card"><i class="fas fa-map-marked-alt text-info fa-lg"></i><div class="small fw-bold mt-1">Карта</div></div></div>
                    <div class="col-4" onclick="openSection('links-page')"><div class="stat-card"><i class="fas fa-link text-warning fa-lg"></i><div class="small fw-bold mt-1">Сілтеме</div></div></div>
                    <div class="col-4" onclick="openSection('glossary')"><div class="stat-card"><i class="fas fa-book text-secondary fa-lg"></i><div class="small fw-bold mt-1">Сөздік</div></div></div>
                    <div class="col-4" onclick="openSection('news-write')"><div class="stat-card"><i class="fas fa-bullhorn text-warning fa-lg"></i><div class="small fw-bold mt-1">Хабар</div></div></div>
                    <div class="col-4 offset-4" onclick="openSection('advisor')"><div class="stat-card"><i class="fas fa-user-tie text-danger fa-lg"></i><div class="small fw-bold mt-1">Advisor</div></div></div>
                </div>
                <div class="s-card mt-4 mb-5">
                    <h5 class="fw-bold mb-3"><i class="fas fa-newspaper me-2 text-primary"></i> Хабарландырулар</h5>
                    <div id="homeNews"></div>
                </div>
            </div>
        </div>

        <div id="links-page" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Сілтемелер</h3></div><a href="https://platonus.vku.edu.kz" target="_blank" style="text-decoration:none" class="list-item"><b>Platonus VKU</b></a><a href="https://lib.vku.edu.kz" target="_blank" style="text-decoration:none" class="list-item"><b>VKU Кітапхана</b></a></div></div>
        <div id="schedule" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Кесте</h3></div><div class="s-card border border-warning"><input type="datetime-local" id="session-input" class="form-control mb-2"><button onclick="saveSession()" class="btn btn-warning w-100 text-white fw-bold">Сессия күнін сақтау</button></div><div class="s-card mt-3"><div class="input-group"><select id="day" class="form-select"><option>Дүйсенбі</option><option>Сейсенбі</option><option>Сәрсенбі</option><option>Бейсенбі</option><option>Жұма</option></select><input type="text" id="subj" class="form-control" placeholder="Пән"><button onclick="addSch()" class="btn btn-success">+</button></div></div><div id="schList" class="mt-3"></div></div></div>
        <div id="academic" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>GPA</h3></div><div id="gpa-rows"></div><button onclick="addGpaRow()" class="btn btn-outline-secondary btn-sm w-100 mb-2">+ Қосу</button><button onclick="calculateAdvancedGPA()" class="btn btn-primary w-100">Есептеу</button><div id="advancedGpaRes" class="mt-3 h3 text-center"></div></div></div>
        <div id="map" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Карта</h3></div><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2564.4447385554316!2d82.6033483!3d49.9575971!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x42eb45953046f631%3A0x63385806f0e47012!2z0JLQmtCjINC40LwuINChLiDQkNC80LDQvdC20L7Qu9C-0LLQsA!5e0!3m2!1sru!2skz!4v1715420000000!5m2!1sru!2skz" width="100%" height="450" style="border:0; border-radius: 20px;"></iframe></div></div>
        <div id="glossary" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Сөздік</h3></div><div id="glossaryView"></div></div></div>
        <div id="news-write" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Жазу</h3></div><textarea id="newsInp" class="form-control mb-2"></textarea><button onclick="saveNews()" class="btn btn-warning w-100">Жариялау</button></div></div>
        <div id="advisor" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Advisor</h3></div><textarea id="anonQ" class="form-control mb-2"></textarea><button onclick="sendQ()" class="btn btn-primary w-100">Сұрақ қою</button></div></div>
        <div id="admin" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Админ</h3></div><input id="glTerm" class="form-control mb-1"><input id="glDef" class="form-control mb-2"><button onclick="addGlossary()" class="btn btn-dark w-100">Қосу</button><div id="adminQList" class="mt-4"></div></div></div>
    </div>

    <script>
        const store = (k, v) => localStorage.setItem(k, JSON.stringify(v));
        const get = (k) => JSON.parse(localStorage.getItem(k) || '[]');

        // --- AUTH LOGIC (ЖАҢА) ---
        function toggleAuth(isLogin) {
            document.getElementById('login-form').style.display = isLogin ? 'block' : 'none';
            document.getElementById('reg-form').style.display = isLogin ? 'none' : 'block';
        }

        function handleAuth(type) {
            const login = document.getElementById(type === 'login' ? 'user-login' : 'reg-login').value;
            const pass = document.getElementById(type === 'login' ? 'user-pass' : 'reg-pass').value;
            if(!login || !pass) return alert("Барлық жерді толтырыңыз!");

            let users = get('app_users');
            if(type === 'reg') {
                if(users.find(u => u.login === login)) return alert("Бұл логин бос емес!");
                users.push({login, pass});
                store('app_users', users);
                alert("Тіркелу сәтті! Енді кіріңіз.");
                toggleAuth(true);
            } else {
                const user = users.find(u => u.login === login && u.pass === pass);
                if(user) {
                    sessionStorage.setItem('current_user', login);
                    initApp();
                } else alert("Қате логин немесе құпия сөз!");
            }
        }

        function initApp() {
            const user = sessionStorage.getItem('current_user');
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('welcome-user').innerText = "Сәлем, " + user + "!";
                updateTimer(); renderNews(); renderSch(); renderGl();
            }
        }

        function logout() {
            sessionStorage.removeItem('current_user');
            location.reload();
        }

        // --- БҰРЫНҒЫ ЛОГИКА (ӨЗГЕРІССІЗ) ---
        const quotes = ["Бүгін кітапханаға баруды ұмытпа! 📚", "Сәттілік! Сенің қолыңнан бәрі келеді. ✨", "Кішкентай қадамдар үлкен жеңіске әкеледі. 🚶‍♂️", "Бүгін жаңа нәрсе үйренуге тамаша күн! 🧠", "Өзіңе сен, өзіңді алып шығар еңбегің мен ниетің! 💪"];
        
        function saveSession() {
            const val = document.getElementById('session-input').value;
            if(!val) return alert("Күнді таңдаңыз!");
            localStorage.setItem('user_exam_date', val);
            updateTimer();
        }

        function updateTimer() {
            const saved = localStorage.getItem('user_exam_date');
            const container = document.getElementById('timer-container');
            const display = document.getElementById("countdown");
            if(!saved) { container.style.display = 'none'; return; }
            const diff = new Date(saved).getTime() - new Date().getTime();
            if(diff <= 0) { container.style.display = 'block'; display.innerText = "Сессия басталды!"; return; }
            container.style.display = 'block';
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            display.innerText = `${days}к ${hours}с қалды`;
        }
        setInterval(updateTimer, 10000);

        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
        }

        function openSection(id) { 
            document.querySelectorAll('.section-page').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            if(id==='admin') renderAdminAll();
        }
        function backToHome() { openSection('home'); }

        function addSch() {
            let d=document.getElementById('day').value, s=document.getElementById('subj').value;
            if(!s) return;
            let l=get('u_sch'); l.push({d,s,id:Date.now()}); store('u_sch',l); renderSch();
        }
        function renderSch() {
            document.getElementById('schList').innerHTML = get('u_sch').map(i => `<div class="list-item"><span><b>${i.d}:</b> ${i.s}</span><i class="fas fa-trash text-danger" onclick="del('u_sch',${i.id},renderSch)"></i></div>`).join('');
        }

        function renderNews() {
            document.getElementById('homeNews').innerHTML = get('u_news').map(x => `<div class="list-item"><div>${x.t}</div></div>`).join('') || "Жаңалық жоқ.";
        }
        function saveNews() {
            let t=document.getElementById('newsInp').value; if(!t) return;
            let n=get('u_news'); n.unshift({t, id:Date.now()}); store('u_news', n); renderNews(); backToHome();
        }

        function del(k, id, cb) { store(k, get(k).filter(x => x.id !== id)); cb(); }

        window.onload = () => { 
            document.getElementById('daily-quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
            initApp(); 
        };
    </script>
</body>
</html>
