<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniStep - Schedule Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1e293b; --secondary: #3b82f6; --accent: #f59e0b;
            --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b;
        }
        [data-theme="dark"] {
            --primary: #0f172a; --secondary: #60a5fa; --bg: #1e293b; 
            --card-bg: #334155; --text: #f1f5f9;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding-bottom: 30px; }
        
        .top-nav { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .hero { min-height: 25vh; background: linear-gradient(135deg, #2a3a50 30%, var(--secondary) 90%); color: white; border-radius: 0 0 40px 40px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        .section-page { display: none; animation: fadeIn 0.4s ease; padding: 20px 15px; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stat-card { border: none; border-radius: 20px; padding: 15px; background: var(--card-bg); box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; text-align: center; transition: 0.3s; color: var(--text); height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .stat-card:hover { background: var(--secondary); color: white; transform: translateY(-3px); }
        .stat-card i { margin-bottom: 8px; }

        .s-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; }
        
        /* Session Timer inside Schedule */
        .session-alert { background: linear-gradient(90deg, var(--accent), #d97706); color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        
        .link-item { display: flex; align-items: center; padding: 15px; background: var(--card-bg); border-radius: 15px; margin-bottom: 12px; text-decoration: none; color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .list-item { border-left: 4px solid var(--secondary); padding: 10px 15px; background: rgba(0,0,0,0.05); border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .todo-done { text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="home" class="section-page active" style="padding:0">
        <div class="top-nav">
            <div class="fw-bold"><i class="fas fa-walking me-2"></i>UniStep</div>
            <i class="fas fa-moon" id="theme-btn" onclick="toggleTheme()" style="cursor:pointer"></i>
        </div>
        <div class="hero">
            <div class="w-100">
                <h2 class="fw-bold">Сәлем! 👋</h2>
                <p class="opacity-75">Цифрлық көмекшің дайын</p>
            </div>
        </div>

        <div class="container mt-4">
            <div class="row g-3">
                <div class="col-4" onclick="openSection('schedule')"><div class="stat-card"><i class="fas fa-calendar-alt text-primary fa-lg"></i><div class="small fw-bold">Кесте</div></div></div>
                <div class="col-4" onclick="openSection('todo')"><div class="stat-card"><i class="fas fa-tasks text-success fa-lg"></i><div class="small fw-bold">Жоспар</div></div></div>
                <div class="col-4" onclick="openSection('academic')"><div class="stat-card"><i class="fas fa-chart-line text-info fa-lg"></i><div class="small fw-bold">GPA</div></div></div>
                
                <div class="col-4" onclick="openSection('links-page')"><div class="stat-card"><i class="fas fa-link text-warning fa-lg"></i><div class="small fw-bold">Сілтеме</div></div></div>
                <div class="col-4" onclick="openSection('glossary')"><div class="stat-card"><i class="fas fa-book text-secondary fa-lg"></i><div class="small fw-bold">Сөздік</div></div></div>
                <div class="col-4" onclick="openSection('map')"><div class="stat-card"><i class="fas fa-map-marked-alt text-danger fa-lg"></i><div class="small fw-bold">Карта</div></div></div>
                
                <div class="col-4" onclick="openSection('news-write')"><div class="stat-card"><i class="fas fa-bullhorn text-primary fa-lg"></i><div class="small fw-bold">Хабар</div></div></div>
                <div class="col-4" onclick="openSection('advisor')"><div class="stat-card"><i class="fas fa-user-tie text-dark fa-lg"></i><div class="small fw-bold">Advisor</div></div></div>
            </div>
            
            <div class="s-card mt-4">
                <h6 class="fw-bold mb-3"><i class="fas fa-newspaper me-2 text-primary"></i> Жаңалықтар</h6>
                <div id="homeNews"></div>
            </div>
        </div>
    </div>

    <div id="schedule" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Кесте</h3></div>
        
        <div class="session-alert">
            <i class="fas fa-hourglass-half me-2"></i> 
            <b>Сессияға қалды:</b> <span id="countdown">Есептелуде...</span>
        </div>

        <div class="s-card mb-3">
            <div class="input-group">
                <select id="day" class="form-select"><option>Дүйсенбі</option><option>Сейсенбі</option><option>Сәрсенбі</option><option>Бейсенбі</option><option>Жұма</option></select>
                <input type="text" id="subj" class="form-control" placeholder="Пән мен уақыт">
                <button onclick="addSch()" class="btn btn-success"><i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div id="schList"></div>
    </div></div>

    <div id="links-page" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Пайдалы сілтемелер</h3></div>
        <a href="https://platonus.vku.edu.kz" target="_blank" class="link-item">
            <i class="fas fa-university me-3 text-primary"></i> <b>Platonus VKU</b>
        </a>
        <a href="https://lib.vku.edu.kz" target="_blank" class="link-item">
            <i class="fas fa-book-reader me-3 text-success"></i> <b>VKU Кітапхана</b>
        </a>
    </div></div>

    <div id="todo" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Жоспар</h3></div>
        <div class="s-card mb-3"><div class="input-group"><input type="text" id="todoInp" class="form-control" placeholder="Жаңа тапсырма..."><button onclick="addTodo()" class="btn btn-success"><i class="fas fa-plus"></i></button></div></div>
        <div id="todoList"></div>
    </div></div>

    <div id="academic" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>GPA</h3></div><div class="s-card"><div id="gpa-rows"><div class="row g-2 mb-2"><div class="col-7"><input type="number" class="form-control gpa-score" placeholder="Балл"></div><div class="col-5"><input type="number" class="form-control gpa-credit" placeholder="Кредит"></div></div></div><button onclick="addGpaRow()" class="btn btn-outline-secondary btn-sm mb-3 w-100">+ Пән қосу</button><button onclick="calculateAdvancedGPA()" class="btn btn-primary w-100">Есептеу</button><div id="advancedGpaRes" class="mt-3 h3 fw-bold text-center"></div></div></div></div>
    <div id="map" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Карта</h3></div><div class="s-card p-0 overflow-hidden"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2543.6!2d82.6!3d49.9!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDnCsDU0JzAwLjAiTiA4MsKwMzYnMDAuMCJF!5e0!3m2!1skk!2skz!4v1620000000000!5m2!1skk!2skz" width="100%" height="400" style="border:0;"></iframe></div></div></div>
    <div id="glossary" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Сөздік</h3></div><div id="glossaryView" class="s-card"></div></div></div>
    <div id="news-write" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Жазу</h3></div><div class="s-card"><textarea id="newsInp" class="form-control mb-3" rows="3" placeholder="Хабарлама..."></textarea><button onclick="saveNews()" class="btn btn-warning w-100 fw-bold">Жариялау</button></div></div></div>
    <div id="advisor" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Advisor</h3></div><div class="s-card"><textarea id="anonQ" class="form-control mb-3" rows="4" placeholder="Сұрағыңыз..."></textarea><button onclick="sendQ()" class="btn btn-primary w-100">Жіберу</button></div></div></div>
    <div id="admin" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Админ</h3></div><div id="adminQList"></div></div></div>

    <div class="text-center py-4"><button onclick="enterAdmin()" class="btn btn-link text-muted" style="text-decoration:none; opacity:0.1">Admin Access</button></div>

    <script>
        // --- СЕССИЯ КҮНІН ОСЫ ЖЕРДЕ ӨЗГЕРТ ---
        const EXAM_DATE = "May 25, 2026 09:00:00"; 

        const store = (k, v) => localStorage.setItem(k, JSON.stringify(v));
        const get = (k) => JSON.parse(localStorage.getItem(k) || '[]');

        function updateTimer() {
            const diff = new Date(EXAM_DATE).getTime() - new Date().getTime();
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const timerEl = document.getElementById("countdown");
            if(timerEl) timerEl.innerText = (diff > 0) ? `${days} күн ${hours} сағат` : "Сессия басталды!";
        }
        setInterval(updateTimer, 1000);

        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
            document.getElementById('theme-btn').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        function openSection(id) { document.querySelectorAll('.section-page').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
        function backToHome() { openSection('home'); }

        // Logic Functions
        function addTodo() { let t = document.getElementById('todoInp').value; if(!t) return; let l = get('u_todo'); l.push({t, done: false, id: Date.now()}); store('u_todo', l); document.getElementById('todoInp').value = ""; renderTodo(); }
        function toggleTodo(id) { let l = get('u_todo'); let i = l.find(x => x.id === id); if(i) i.done = !i.done; store('u_todo', l); renderTodo(); }
        function renderTodo() { document.getElementById('todoList').innerHTML = get('u_todo').map(i => `<div class="list-item"><span class="${i.done?'todo-done':''}" onclick="toggleTodo(${i.id})">${i.t}</span><i class="fas fa-trash text-danger" onclick="del('u_todo',${i.id},renderTodo)"></i></div>`).join('') || "Бос."; }
        function addGpaRow() { const row = document.createElement('div'); row.className='row g-2 mb-2'; row.innerHTML='<div class="col-7"><input type="number" class="form-control gpa-score" placeholder="Балл"></div><div class="col-5"><input type="number" class="form-control gpa-credit" placeholder="Кредит"></div>'; document.getElementById('gpa-rows').appendChild(row); }
        function calculateAdvancedGPA() {
            let tp = 0, tc = 0;
            document.querySelectorAll('.gpa-score').forEach((s, i) => {
                let score = parseFloat(s.value), credit = parseFloat(document.querySelectorAll('.gpa-credit')[i].value);
                if (score && credit) { let g = score >= 90 ? 4.0 : score >= 80 ? 3.0 : score >= 70 ? 2.0 : 1.0; tp += g * credit; tc += credit; }
            });
            document.getElementById('advancedGpaRes').innerText = "GPA: " + (tc > 0 ? (tp/tc).toFixed(2) : 0);
        }
        function saveNews() { let t = document.getElementById('newsInp').value; if(!t) return; let n = get('u_news'); n.unshift({t, id: Date.now()}); store('u_news', n); renderNews(); backToHome(); }
        function renderNews() { document.getElementById('homeNews').innerHTML = get('u_news').slice(0,3).map(x => `<div class="list-item">${x.t}</div>`).join('') || "Жаңалық жоқ."; }
        function addSch() { let d=document.getElementById('day').value, s=document.getElementById('subj').value; if(!s) return; let l=get('u_sch'); l.push({d,s,id:Date.now()}); store('u_sch',l); renderSch(); }
        function renderSch() { document.getElementById('schList').innerHTML = get('u_sch').map(i => `<div class="list-item"><span><b>${i.d}:</b> ${i.s}</span><i class="fas fa-trash text-danger" onclick="del('u_sch',${i.id},renderSch)"></i></div>`).join(''); }
        function sendQ() { alert("Жіберілді!"); backToHome(); }
        function del(k, id, cb) { store(k, get(k).filter(x => x.id !== id)); cb(); }

        window.onload = () => { updateTimer(); renderNews(); renderSch(); renderTodo(); };
    </script>
</body>
</html>
