<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniStep - Ultimate Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1e293b; --secondary: #3b82f6; --accent: #f59e0b;
            --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b;
            --muted: #64748b;
        }

        [data-theme="dark"] {
            --primary: #0f172a; --secondary: #60a5fa; --bg: #0f172a; 
            --card-bg: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); 
            color: var(--text); transition: 0.3s; margin: 0; padding-bottom: 30px; 
        }
        
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .auth-card { 
            width: 90%; max-width: 400px; padding: 30px; background: var(--card-bg); 
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; 
        }

        .top-nav { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .hero { min-height: 35vh; background: linear-gradient(135deg, #2a3a50 30%, var(--secondary) 90%); color: white; border-radius: 0 0 40px 40px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .timer-box { display: none; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 20px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.2); width: fit-content; margin-left: auto; margin-right: auto; color: white; }

        .section-page { display: none; animation: fadeIn 0.4s ease; padding: 25px 15px; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stat-card { 
            border: none; border-radius: 20px; padding: 15px; background: var(--card-bg); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; text-align: center; 
            transition: 0.3s; color: var(--text); height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .stat-card:hover { transform: translateY(-5px); background: var(--secondary); color: white; }
        .s-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; color: var(--text); }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; color: var(--text); }
        .list-item { border-left: 4px solid var(--secondary); padding: 10px 15px; background: rgba(125,125,125,0.1); border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        input, select, textarea { background-color: var(--bg) !important; color: var(--text) !important; border: 1px solid var(--muted) !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 class="fw-bold mb-4 text-primary"><i class="fas fa-walking me-2"></i>UniStep</h2>
            <div id="login-form">
                <input type="text" id="user-login" class="form-control mb-3" placeholder="Логин">
                <input type="password" id="user-pass" class="form-control mb-3" placeholder="Құпия сөз">
                <button onclick="handleAuth('login')" class="btn btn-primary w-100 mb-2">Кіру</button>
                <button onclick="toggleAuth(false)" class="btn btn-link btn-sm">Тіркелу</button>
            </div>
            <div id="reg-form" style="display:none">
                <input type="text" id="reg-login" class="form-control mb-3" placeholder="Жаңа логин">
                <input type="password" id="reg-pass" class="form-control mb-3" placeholder="Жаңа құпия сөз">
                <button onclick="handleAuth('reg')" class="btn btn-success w-100 mb-2">Тіркелу</button>
                <button onclick="toggleAuth(true)" class="btn btn-link btn-sm">Кіруге қайту</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <div id="home" class="section-page active" style="padding:0">
            <div class="top-nav">
                <div class="fw-bold" id="welcome-user">UniStep</div>
                <div>
                    <i class="fas fa-moon me-3" id="theme-btn" onclick="toggleTheme()" style="cursor:pointer"></i>
                    <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor:pointer"></i>
                </div>
            </div>
            <div class="hero">
                <div class="w-100">
                    <h2 class="fw-bold">UniStep: Цифрлық Ментор</h2>
                    <p id="daily-quote" class="mt-2" style="font-size: 1rem; opacity: 0.9; padding: 0 10px;"></p>
                    <div id="timer-container" class="timer-box">
                        <div class="small mb-1">Сессияға қалды:</div>
                        <div id="countdown" class="h5 fw-bold mb-0"></div>
                    </div>
                </div>
            </div>

            <div class="container mt-4">
                <div class="row g-3">
                    <div class="col-4" onclick="openSection('schedule')"><div class="stat-card"><i class="fas fa-calendar-alt text-primary fa-lg"></i><div class="small fw-bold mt-1">Кесте</div></div></div>
                    <div class="col-4" onclick="openSection('academic')"><div class="stat-card"><i class="fas fa-chart-line text-success fa-lg"></i><div class="small fw-bold mt-1">GPA</div></div></div>
                    <div class="col-4" onclick="openSection('map')"><div class="stat-card"><i class="fas fa-map-marked-alt text-info fa-lg"></i><div class="small fw-bold mt-1">Карта</div></div></div>
                    <div class="col-4" onclick="openSection('links-page')"><div class="stat-card"><i class="fas fa-link text-warning fa-lg"></i><div class="small fw-bold mt-1">Сілтеме</div></div></div>
                    <div class="col-4" onclick="openSection('glossary')"><div class="stat-card"><i class="fas fa-book text-secondary fa-lg"></i><div class="small fw-bold mt-1">Сөздік</div></div></div>
                    <div class="col-4" onclick="openSection('news-write')"><div class="stat-card"><i class="fas fa-bullhorn text-warning fa-lg"></i><div class="small fw-bold mt-1">Хабар</div></div></div>
                    <div class="col-4 offset-4" onclick="openSection('advisor')"><div class="stat-card"><i class="fas fa-user-tie text-danger fa-lg"></i><div class="small fw-bold mt-1">Advisor</div></div></div>
                </div>
                <div class="s-card mt-4 mb-5">
                    <h5 class="fw-bold mb-3"><i class="fas fa-newspaper me-2 text-primary"></i> Хабарландырулар</h5>
                    <div id="homeNews"></div>
                </div>
            </div>
        </div>

        <div id="schedule" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Кесте</h3></div><div id="schList"></div></div></div>
        <div id="academic" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>GPA Есептеу</h3></div><div id="gpa-rows"></div><button onclick="addGpaRow()" class="btn btn-primary w-100">GPA Есептеу</button><div id="advancedGpaRes" class="mt-3 text-center h3 fw-bold"></div></div></div>
        <div id="links-page" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Сілтемелер</h3></div><div id="links-container"></div></div></div>
        <div id="glossary" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Сөздік</h3></div><div id="glossaryView" class="s-card"></div></div></div>
        <div id="news-write" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Хабар жазу</h3></div><textarea id="newsInp" class="form-control mb-3" rows="3"></textarea><button onclick="saveNews()" class="btn btn-warning w-100">Жариялау</button></div></div>
        <div id="advisor" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Advisor</h3></div><textarea id="anonQ" class="form-control mb-3" rows="4"></textarea><button onclick="sendQ()" class="btn btn-primary w-100">Жіберу</button></div></div>
        
        <div id="admin" class="section-page"><div class="container"><div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Админ</h3></div><div class="s-card"><h6>Жаңа терминдеп қосу</h6><input id="glTerm" class="form-control mb-2" placeholder="Терминдеп (сөз)"><input id="glDef" class="form-control mb-2" placeholder="Анықтамасы"><button onclick="addGlossary()" class="btn btn-primary w-100">Қосу</button></div><div id="adminQList" class="mt-3"></div></div></div>

        <div class="text-center py-4"><button onclick="enterAdmin()" class="btn btn-link text-muted" style="text-decoration:none; opacity:0.1">Admin Access</button></div>
    </div>

    <script>
        const store = (k, v) => localStorage.setItem(k, JSON.stringify(v));
        const get = (k) => JSON.parse(localStorage.getItem(k) || '[]');

        // МОТИВАЦИЯ ТІЗІМІ
        const quotes = [
            "Бүгін кітапханаға баруды ұмытпа! 📚", 
            "Сәттілік! Сенің қолыңнан бәрі келеді. ✨", 
            "Кішкентай қадамдар үлкен жеңіске әкеледі. 🚶‍♂️", 
            "Өзіңе сен өзіңді алып шығар-еңбегің мен ниетің екі жақтап💪",
            "Бүгін жаңа нәрсе үйренуге тамаша күн! 🧠"
        ];

        // AUTH
        function toggleAuth(isLogin) {
            document.getElementById('login-form').style.display = isLogin ? 'block' : 'none';
            document.getElementById('reg-form').style.display = isLogin ? 'none' : 'block';
        }
        function handleAuth(type) {
            const login = document.getElementById(type === 'login' ? 'user-login' : 'reg-login').value;
            const pass = document.getElementById(type === 'login' ? 'user-pass' : 'reg-pass').value;
            if(!login || !pass) return alert("Толтырыңыз!");
            let users = get('app_users');
            if(type === 'reg') {
                if(users.find(u => u.login === login)) return alert("Логин бос емес!");
                users.push({login, pass}); store('app_users', users);
                alert("Тіркелдіңіз!"); toggleAuth(true);
            } else {
                const user = users.find(u => u.login === login && u.pass === pass);
                if(user) { sessionStorage.setItem('current_user', login); initApp(); } else alert("Қате!");
            }
        }
        function initApp() {
            const user = sessionStorage.getItem('current_user');
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('welcome-user').innerText = "Сәлем, " + user;
                renderNews(); renderGl();
            }
        }
        function logout() { sessionStorage.removeItem('current_user'); location.reload(); }

        // THEME
        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
            document.getElementById('theme-btn').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        // NAVIGATION
        function openSection(id) {
            document.querySelectorAll('.section-page').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'admin') renderAdminAll();
        }
        function backToHome() { openSection('home'); }

        // GLOSSARY (ТЕРМИНДЕП)
        function addGlossary() {
            let t = document.getElementById('glTerm').value, d = document.getElementById('glDef').value;
            if(!t || !d) return;
            let gl = get('u_gl'); gl.push({t, d, id: Date.now()}); store('u_gl', gl);
            document.getElementById('glTerm').value = ''; document.getElementById('glDef').value = '';
            renderGl(); alert("Терминдеп қосылды!");
        }
        function renderGl() {
            document.getElementById('glossaryView').innerHTML = get('u_gl').map(i => `<div class="mb-2"><b>${i.t}</b> - ${i.d}</div>`).join('') || "Сөздік бос.";
        }

        // NEWS & ADMIN
        function saveNews() {
            let t = document.getElementById('newsInp').value; if(!t) return;
            let n = get('u_news'); n.unshift({t, id: Date.now()}); store('u_news', n);
            renderNews(); backToHome();
        }
        function renderNews() {
            document.getElementById('homeNews').innerHTML = get('u_news').map(x => `<div class="list-item"><div>${x.t}</div></div>`).join('') || "Жаңалық жоқ.";
        }
        function enterAdmin() { if(prompt("Пароль:") === "admin123") openSection('admin'); }
        function renderAdminAll() {
            document.getElementById('adminQList').innerHTML = get('u_qs').map(i => `<div class="small border-bottom mb-2">${i.q} <button class="btn btn-sm text-danger" onclick="del('u_qs',${i.id},renderAdminAll)">Өшіру</button></div>`).join('');
        }
        function del(k, id, cb) { store(k, get(k).filter(x => x.id !== id)); cb(); }
        function sendQ() {
            let q = document.getElementById('anonQ').value; if(!q) return;
            let qs = get('u_qs'); qs.push({q, id: Date.now()}); store('u_qs', qs);
            alert("Жіберілді!"); backToHome();
        }

        window.onload = () => {
            document.getElementById('daily-quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
            initApp();
        };
    </script>
</body>
</html>
