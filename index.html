<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniStep - Ultimate Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1e293b; --secondary: #3b82f6; --accent: #f59e0b;
            --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b;
        }
        [data-theme="dark"] {
            --primary: #0f172a; --secondary: #60a5fa; --bg: #1e293b; 
            --card-bg: #334155; --text: #f1f5f9;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; }
        
        .top-nav { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .hero { min-height: 32vh; background: linear-gradient(135deg, #2a3a50 30%, var(--secondary) 90%); color: white; border-radius: 0 0 40px 40px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 30px 20px; }
        
        .section-page { display: none; animation: fadeIn 0.4s ease; padding: 25px 15px; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stat-card { border: none; border-radius: 20px; padding: 15px; background: var(--card-bg); box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; text-align: center; transition: 0.3s; color: var(--text); height: 100%; }
        .stat-card:hover { transform: translateY(-5px); }
        .s-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; }
        
        .timer-box { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.2); }
        .link-btn { display: flex; align-items: center; padding: 12px; background: var(--card-bg); border-radius: 15px; margin-bottom: 10px; text-decoration: none; color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; }
        .link-btn:hover { background: var(--secondary); color: white; }
        
        .list-item { border-left: 4px solid var(--secondary); padding: 10px 15px; background: rgba(0,0,0,0.05); border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .urgent { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.1); animation: pulse 2s infinite; }
        .todo-done { text-decoration: line-through; opacity: 0.6; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="home" class="section-page active" style="padding:0">
        <div class="top-nav">
            <div class="fw-bold"><i class="fas fa-walking me-2"></i>UniStep</div>
            <i class="fas fa-moon" id="theme-btn" onclick="toggleTheme()" style="cursor:pointer"></i>
        </div>
        <div class="hero">
            <div class="w-100">
                <h2 class="fw-bold">Сәлем, Студент! 👋</h2>
                <p id="daily-quote" class="small opacity-90"></p>
                <div class="timer-box">
                    <div class="small mb-1">Сессияға дейін:</div>
                    <div id="countdown" class="h4 fw-bold mb-0">-- күн -- сағат</div>
                </div>
            </div>
        </div>

        <div class="container mt-4">
            <div class="row g-3 mb-4">
                <div class="col-4" onclick="openSection('schedule')"><div class="stat-card"><i class="fas fa-calendar-alt text-primary fa-lg"></i><div class="small fw-bold mt-1">Кесте</div></div></div>
                <div class="col-4" onclick="openSection('todo')"><div class="stat-card"><i class="fas fa-tasks text-success fa-lg"></i><div class="small fw-bold mt-1">Жоспар</div></div></div>
                <div class="col-4" onclick="openSection('academic')"><div class="stat-card"><i class="fas fa-chart-line text-info fa-lg"></i><div class="small fw-bold mt-1">GPA</div></div></div>
            </div>

            <h6 class="fw-bold mb-3"><i class="fas fa-link me-2 text-secondary"></i> Пайдалы сілтемелер</h6>
            <div class="mb-4">
                <a href="https://platonus.vku.edu.kz" target="_blank" class="link-btn">
                    <i class="fas fa-university text-primary me-3"></i><span>Platonus VKU</span><i class="fas fa-chevron-right ms-auto opacity-50"></i>
                </a>
                <a href="https://lib.vku.edu.kz" target="_blank" class="link-btn">
                    <i class="fas fa-book-reader text-success me-3"></i><span>Кітапхана</span><i class="fas fa-chevron-right ms-auto opacity-50"></i>
                </a>
            </div>

            <div class="row g-3">
                <div class="col-4" onclick="openSection('map')"><div class="stat-card"><i class="fas fa-map-marked-alt text-secondary"></i><div class="small fw-bold mt-1">Карта</div></div></div>
                <div class="col-4" onclick="openSection('glossary')"><div class="stat-card"><i class="fas fa-book text-dark"></i><div class="small fw-bold mt-1">Сөздік</div></div></div>
                <div class="col-4" onclick="openSection('news-write')"><div class="stat-card"><i class="fas fa-bullhorn text-warning"></i><div class="small fw-bold mt-1">Хабар</div></div></div>
            </div>
            
            <div class="s-card mt-4 mb-5">
                <h5 class="fw-bold mb-3"><i class="fas fa-newspaper me-2 text-primary"></i> Хабарландырулар</h5>
                <div id="homeNews"></div>
            </div>
        </div>
    </div>

    <div id="todo" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Жоспар</h3></div>
        <div class="s-card mb-3"><div class="input-group"><input type="text" id="todoInp" class="form-control" placeholder="Жаңа тапсырма..."><button onclick="addTodo()" class="btn btn-success"><i class="fas fa-plus"></i></button></div></div>
        <div id="todoList"></div>
    </div></div>

    <div id="academic" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Семестрлік GPA</h3></div>
        <div class="s-card">
            <div id="gpa-rows"><div class="row g-2 mb-2"><div class="col-7"><input type="number" class="form-control gpa-score" placeholder="Балл"></div><div class="col-5"><input type="number" class="form-control gpa-credit" placeholder="Кредит"></div></div></div>
            <button onclick="addGpaRow()" class="btn btn-outline-secondary btn-sm mb-3">+ Пән қосу</button>
            <button onclick="calculateAdvancedGPA()" class="btn btn-primary w-100">Есептеу</button>
            <div id="advancedGpaRes" class="mt-3 text-center h3 fw-bold text-success"></div>
        </div>
    </div></div>

    <div id="schedule" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Кесте</h3></div>
        <div class="s-card mb-3"><div class="input-group"><select id="day" class="form-select"><option>Дүйсенбі</option><option>Сейсенбі</option><option>Сәрсенбі</option><option>Бейсенбі</option><option>Жұма</option></select><input type="text" id="subj" class="form-control" placeholder="Уақыты: Пән"><button onclick="addSch()" class="btn btn-success"><i class="fas fa-plus"></i></button></div></div>
        <div id="schList"></div>
    </div></div>

    <div id="map" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Карта</h3></div>
        <div class="s-card p-0 overflow-hidden"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2564.4443655416!2d82.6074!3d49.9577!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDnCsDU3JzI3LjciTiA4MsKwMzYnMjYuNiJF!5e0!3m2!1skk!2skz!4v1650000000000" width="100%" height="450" style="border:0;"></iframe></div>
    </div></div>

    <div id="glossary" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Сөздік</h3></div>
        <div id="glossaryView" class="s-card"></div>
    </div></div>

    <div id="news-write" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Хабар жазу</h3></div>
        <div class="s-card">
            <textarea id="newsInp" class="form-control mb-3" rows="3" placeholder="Хабарлама..."></textarea>
            <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" id="urgentCheck"><label class="form-check-label" for="urgentCheck">⚠️ Шұғыл</label></div>
            <button onclick="saveNews()" class="btn btn-warning w-100 fw-bold">Жариялау</button>
        </div>
    </div></div>

    <div id="advisor" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Advisor</h3></div>
        <div class="s-card"><h5>Анонимді сұрақ</h5><textarea id="anonQ" class="form-control mb-3" rows="4"></textarea><button onclick="sendQ()" class="btn btn-primary w-100">Жіберу</button></div>
    </div></div>

    <div id="admin" class="section-page"><div class="container">
        <div class="d-flex align-items-center mb-4"><i class="fas fa-arrow-left back-btn" onclick="backToHome()"></i><h3>Админ Панель</h3></div>
        <div class="s-card mb-4"><h5>➕ Глоссарий қосу</h5><input type="text" id="glTerm" class="form-control mb-1" placeholder="Термин"><input type="text" id="glDef" class="form-control mb-2" placeholder="Анықтама"><button onclick="addGlossary()" class="btn btn-primary btn-sm">Қосу</button></div>
        <div class="s-card"><h6>Сұрақтар:</h6><div id="adminQList"></div><hr><h6>Глоссарий тізімі:</h6><div id="adminGlList"></div></div>
    </div></div>

    <div class="text-center py-4"><button onclick="enterAdmin()" class="btn btn-link text-muted" style="opacity:0.1; text-decoration:none;">Admin Access</button></div>

    <script>
        const store = (k, v) => localStorage.setItem(k, JSON.stringify(v));
        const get = (k) => JSON.parse(localStorage.getItem(k) || '[]');

        // --- TIMER ---
        const examDate = new Date("May 20, 2026 09:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = examDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("countdown").innerText = (diff > 0) ? `${days} күн ${hours} сағат` : "Сессия басталды!";
        }
        setInterval(updateTimer, 1000);

        // --- THEME & NAV ---
        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
            document.getElementById('theme-btn').className = (theme === 'dark') ? 'fas fa-sun' : 'fas fa-moon';
        }
        function openSection(id) { document.querySelectorAll('.section-page').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); if(id==='admin') renderAdminAll(); }
        function backToHome() { openSection('home'); }

        // --- TODO ---
        function addTodo() { let t = document.getElementById('todoInp').value; if(!t) return; let l = get('u_todo'); l.push({t, done: false, id: Date.now()}); store('u_todo', l); document.getElementById('todoInp').value = ""; renderTodo(); }
        function toggleTodo(id) { let l = get('u_todo'); let i = l.find(x => x.id === id); if(i) i.done = !i.done; store('u_todo', l); renderTodo(); }
        function renderTodo() { document.getElementById('todoList').innerHTML = get('u_todo').map(i => `<div class="list-item"><span class="${i.done?'todo-done':''}" onclick="toggleTodo(${i.id})" style="cursor:pointer">${i.t}</span><i class="fas fa-trash text-danger" onclick="del('u_todo',${i.id},renderTodo)"></i></div>`).join('') || "Жоспар бос."; }

        // --- GPA ---
        function addGpaRow() { const row = document.createElement('div'); row.className='row g-2 mb-2'; row.innerHTML='<div class="col-7"><input type="number" class="form-control gpa-score" placeholder="Балл"></div><div class="col-5"><input type="number" class="form-control gpa-credit" placeholder="Кредит"></div>'; document.getElementById('gpa-rows').appendChild(row); }
        function calculateAdvancedGPA() {
            let tp = 0, tc = 0;
            document.querySelectorAll('.gpa-score').forEach((s, i) => {
                let score = parseFloat(s.value), credit = parseFloat(document.querySelectorAll('.gpa-credit')[i].value);
                if (score && credit) { let g = score >= 90 ? 4.0 : score >= 80 ? 3.0 : score >= 70 ? 2.0 : 1.0; tp += g * credit; tc += credit; }
            });
            document.getElementById('advancedGpaRes').innerText = "GPA: " + (tc > 0 ? (tp/tc).toFixed(2) : 0);
        }

        // --- NEWS ---
        function saveNews() { let t = document.getElementById('newsInp').value, u = document.getElementById('urgentCheck').checked; if(!t) return; let n = get('u_news'); n.unshift({t, urgent: u, time: Date.now(), id: Date.now()}); store('u_news', n); renderNews(); backToHome(); }
        function renderNews() { document.getElementById('homeNews').innerHTML = get('u_news').slice(0,5).map(x => `<div class="list-item ${x.urgent?'urgent':''}"><div>${x.t}</div><i class="fas fa-times" onclick="del('u_news',${x.id},renderNews)"></i></div>`).join('') || "Хабарлама жоқ."; }

        // --- SCHEDULE ---
        function addSch() { let d = document.getElementById('day').value, s = document.getElementById('subj').value; if(!s) return; let l = get('u_sch'); l.push({d, s, id: Date.now()}); store('u_sch', l); renderSch(); }
        function renderSch() { document.getElementById('schList').innerHTML = get('u_sch').map(i => `<div class="list-item"><span><b>${i.d}:</b> ${i.s}</span><i class="fas fa-trash text-danger" onclick="del('u_sch',${i.id},renderSch)"></i></div>`).join(''); }

        // --- GLOSSARY ---
        function addGlossary() { let t=document.getElementById('glTerm').value, d=document.getElementById('glDef').value; if(!t||!d) return; let gl=get('u_gl'); gl.push({t,d,id:Date.now()}); store('u_gl', gl); renderGl(); }
        function renderGl() { let gl=get('u_gl'); document.getElementById('glossaryView').innerHTML = gl.map(i => `<div class="mb-3"><b>${i.t}</b> - ${i.d}</div>`).join('') || "Бос."; document.getElementById('adminGlList').innerHTML = gl.map(i => `<div class="small py-1">${i.t} <i class="fas fa-trash text-danger float-end" onclick="del('u_gl',${i.id},renderGl)"></i></div>`).join(''); }

        // --- ADMIN & ADVISOR ---
        function sendQ() { let q=document.getElementById('anonQ').value; if(!q) return; let qs=get('u_qs'); qs.push({q, id:Date.now(), t: new Date().toLocaleString()}); store('u_qs', qs); alert("Жіберілді!"); document.getElementById('anonQ').value=""; backToHome(); }
        function enterAdmin() { if(prompt("Пароль:") === "admin123") openSection('admin'); }
        function renderAdminAll() { document.getElementById('adminQList').innerHTML = get('u_qs').map(i => `<div class="alert alert-light border small">${i.q}<i class="fas fa-trash text-danger float-end" onclick="del('u_qs',${i.id},renderAdminAll)"></i></div>`).join('') || "Сұрақ жоқ."; renderGl(); }

        function del(k, id, cb) { store(k, get(k).filter(x => x.id !== id)); cb(); }

        window.onload = () => {
            document.getElementById('daily-quote').innerText = "Бүгінгі күніңе сәттілік тілеймін! ✨";
            updateTimer(); renderNews(); renderSch(); renderGl(); renderTodo();
        };
    </script>
</body>
</html>
